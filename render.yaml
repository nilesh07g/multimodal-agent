services:
  - type: web
    name: multimodal-agent
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # values must be set in the render dashboard, never committed
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      # optional overrides — safe defaults live in app/config.py
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: WHISPER_MODEL
        value: whisper-large-v3-turbo
